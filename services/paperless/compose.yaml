services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - paperless_internal
  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - paperless_internal
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: nre3zL2i4qTdof^icrmKvSB*Kmh!5h
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    # ports:
    #   - "8010:8000"
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    networks:
      - paperless_internal
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperless.rule=Host(`paperless.prplalpca.com`)"
      - "traefik.http.routers.paperless.entrypoints=websecure"
      - "traefik.http.services.paperless.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.paperless-headers.headers.sslProxyHeaders.X-Forwarded-Proto=https"
      - "traefik.docker.network=traefik_proxy"

      - "traefik.http.middlewares.paperless-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.paperless-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.paperless-sec.headers.stsPreload=true"

      - "traefik.http.routers.paperless.middlewares=paperless-sec"
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: nre3zL2i4qTdof^icrmKvSB*Kmh!5h

      PAPERLESS_URL: https://paperless.prplalpca.com
      PAPERLESS_ALLOWED_HOSTS: paperless.prplalpca.com
      PAPERLESS_USE_X_FORWARD_HOST: true
      PAPERLESS_USE_X_FORWARD_PORT: true
      PAPERLESS_PROXY_SSL_HEADER: '["HTTP_X_FORWARDED_PROTO", "https"]'
    env_file:
      - stack.env
volumes:
  data:
  media:
  pgdata:
  redisdata:
networks:
  traefik_proxy:
    external: true
  paperless_internal:

