services:
  plex:
    container_name: plex
    image: plexinc/pms-docker
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:32400:32400/tcp"
    environment:
      - HOSTNAME=PlexServer
      - TZ=${TZ:-America/Chicago}
      - PLEX_CLAIM=${PLEX_CLAIM}
      - ADVERTISE_IP=${ADVERTISE_IP:-http://localhost:32400/}
    hostname: PlexServer
    volumes:
      - /home/erich/src/plex/database:/config
      - /home/erich/src/plex/transcode/temp:/transcode
      - /media/drobo:/media/drobo
      - /home/erich/Downloads/Youtube:/media/metube
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plex.rule=${TRAEFIK_RULE:-Host(`plex.localhost`)}"
      - "traefik.http.routers.plex.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"

networks:
  traefik-net:
    external: true
