services:

  #########################################################
  # VPN (TorGuard via Gluetun)
  #########################################################

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    ports:
      - "${BIND_IP:-127.0.0.1}:8506:8080" # Fallback port for qBittorrent webUI
    networks:
      - vpn
      - traefik-net
    volumes:
      - /docker/gluetun:/gluetun
    env_file:
      - path: .env
        required: true
      - path: secrets.env
        required: false
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_ALLOWED_IPS=0.0.0.0/0
      - DNS_ADDRESS=1.1.1.1
      - FIREWALL=on
      - FIREWALL_OUTBOUND_SUBNETS=10.4.0.0/24
      - FIREWALL_INPUT_PORTS=8080
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.qbittorrent.rule=${QBITTORRENT_TRAEFIK_RULE:-Host(`qbittorrent.localhost`)}"
      - "traefik.http.routers.qbittorrent.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
    restart: unless-stopped


  #########################################################
  # qBittorrent (VPN only)
  #########################################################

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
      - WEBUI_PORT=8080
      - QBT_WEBUI_BIND_ADDRESS=0.0.0.0
    volumes:
      - /docker/qbittorrent:/config
      - /media/drobo/Downloads:/downloads
    restart: unless-stopped


  #########################################################
  # Bazarr
  #########################################################

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    ports:
      - "${BIND_IP:-127.0.0.1}:8507:6767" # Fallback port
    networks:
      - traefik-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - /docker/bazarr:/config
      - /media/drobo/Downloads:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.bazarr.rule=${BAZARR_TRAEFIK_RULE:-Host(`bazarr.localhost`)}"
      - "traefik.http.routers.bazarr.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.bazarr.loadbalancer.server.port=8507"


  #########################################################
  # Flaresolverr
  #########################################################

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    networks:
      - traefik-net
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped


  #########################################################
  # Prowlarr
  #########################################################

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "${BIND_IP:-127.0.0.1}:8508:9696" # Fallback port
    networks:
      - traefik-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - /docker/prowlarr:/config
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.prowlarr.rule=${PROWLARR_TRAEFIK_RULE:-Host(`prowlarr.localhost`)}"
      - "traefik.http.routers.prowlarr.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=8508"


  #########################################################
  # Radarr
  #########################################################

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "${BIND_IP:-127.0.0.1}:8509:7878" # Fallback port
    networks:
      - traefik-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - /docker/radarr:/config
      - /media/drobo/Downloads:/media
      - /media/drobo/Downloads:/downloads
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.radarr.rule=${RADARR_TRAEFIK_RULE:-Host(`radarr.localhost`)}"
      - "traefik.http.routers.radarr.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.radarr.loadbalancer.server.port=8509"


  #########################################################
  # Sonarr
  #########################################################

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "${BIND_IP:-127.0.0.1}:8510:8989" # Fallback port
    networks:
      - traefik-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Chicago}
    volumes:
      - /docker/sonarr:/config
      - /media/drobo/Downloads:/media
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.sonarr.rule=${SONARR_TRAEFIK_RULE:-Host(`sonarr.localhost`)}"
      - "traefik.http.routers.sonarr.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8510"


#########################################################
# Networks
#########################################################

networks:
  vpn:
    driver: bridge
  traefik-net:
    external: true
